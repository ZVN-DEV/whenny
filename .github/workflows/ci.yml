name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Type check
        run: npm run typecheck

      - name: Report bundle sizes
        if: matrix.node-version == '20.x'
        run: |
          echo "## Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          echo "| Package | File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|------|------|" >> $GITHUB_STEP_SUMMARY
          for f in packages/whenny/dist/*.js packages/whenny/dist/*.cjs; do
            if [ -f "$f" ]; then
              size=$(wc -c < "$f" | tr -d ' ')
              gzip_size=$(gzip -c "$f" | wc -c | tr -d ' ')
              echo "| whenny | $(basename $f) | ${size}B (${gzip_size}B gzip) |" >> $GITHUB_STEP_SUMMARY
            fi
          done
